<div class="job-dialog">
  <div class="job-form-header" mat-dialog-title>
    <div>
      <p class="eyebrow">Jobs</p>
      <h1>{{ pageTitle() }}</h1>
      <p class="supporting-copy">{{ pageDescription() }}</p>
    </div>

    <button mat-stroked-button type="button" (click)="close()">
      Cancel
    </button>
  </div>

  <div mat-dialog-content class="dialog-content">
    <div *ngIf="errorMessage()" class="error-box">
      {{ errorMessage() }}
    </div>

    <p *ngIf="loading()" class="status-message">Loading job details...</p>

    <form *ngIf="!loading()" [formGroup]="form" (ngSubmit)="submit()" class="job-form">
      <mat-form-field appearance="outline">
        <mat-label>Job Title</mat-label>
        <input matInput formControlName="title" maxlength="100" />
        <mat-hint align="end">{{ form.controls.title.value.length }}/100</mat-hint>
        <mat-error *ngIf="form.controls.title.hasError('required')">
          A job title is required.
        </mat-error>
      </mat-form-field>

      <div class="two-column-grid">
        <mat-form-field appearance="outline">
          <mat-label>Tenant ID</mat-label>
          <input matInput type="number" formControlName="tenantId" min="1" />
          <mat-error *ngIf="form.controls.tenantId.hasError('required')">
            A tenant id is required.
          </mat-error>
          <mat-error *ngIf="form.controls.tenantId.hasError('min')">
            Tenant id must be greater than 0.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Status</mat-label>
          <mat-select formControlName="status">
            <mat-option *ngFor="let status of statusOptions" [value]="status.value">
              {{ status.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button matButton="filled" type="submit" [disabled]="saving()">
          {{ saving() ? 'Saving...' : (isEditMode ? 'Save Changes' : 'Create Job') }}
        </button>

        <button mat-stroked-button type="button" (click)="close()">
          Close
        </button>
      </div>
    </form>
  </div>
</div>
