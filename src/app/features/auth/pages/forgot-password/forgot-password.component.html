<mat-horizontal-stepper linear>

  <!-- STEP 1 -->
  <mat-step [stepControl]="emailForm">
    <form [formGroup]="emailForm">
      <h3>Find Your Account</h3>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" />
      </mat-form-field>

      <button mat-raised-button color="primary"
              matStepperNext
              (click)="findUser()"
              [disabled]="emailForm.invalid">
        Continue
      </button>
    </form>
  </mat-step>

  <!-- STEP 2 -->
  <mat-step [stepControl]="securityForm">
    <form [formGroup]="securityForm">
      <h3>Answer Security Question</h3>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Select Question</mat-label>
        <mat-select formControlName="selectedQuestion">
          <mat-option *ngFor="let q of securityQuestions" [value]="q">
            {{ q }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Your Answer</mat-label>
        <input matInput formControlName="answer" />
      </mat-form-field>

      <button mat-raised-button color="primary"
              matStepperNext
              (click)="verifyAnswer()"
              [disabled]="securityForm.invalid">
        Verify
      </button>
    </form>
  </mat-step>

  <!-- STEP 3 -->
  <mat-step [stepControl]="resetForm">
    <form [formGroup]="resetForm">
      <h3>Reset Password</h3>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>New Password</mat-label>
        <input matInput type="password" formControlName="newPassword" />
      </mat-form-field>

      <button mat-raised-button color="primary"
              (click)="resetPassword()"
              [disabled]="resetForm.invalid">
        Reset Password
      </button>
    </form>
  </mat-step>

</mat-horizontal-stepper>
